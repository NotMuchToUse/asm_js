<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng nhập</title>
    <link
      rel="shortcut icon"
      href="./asset/logo-main.png"
      type="image/x-icon"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    />
  </head>
  <body>
    <section
      class="container d-flex flex-column justify-content-center align-items-center"
      style="height: 100vh"
    >
      <div class="d-flex align-items-center gap-1">
        <img
          src="./asset/logo-main.png"
          alt="logo"
          width="40px"
          height="40px"
        />
        <h1>Đăng ký</h1>
      </div>
      <form
        id="register"
        class="border p-5 rounded d-flex flex-column gap-2 shadow"
      >
        <div class="form-group">
          <label for="exampleInputEmail1">Địa chỉ email</label>
          <input
            type="email"
            class="form-control"
            id="exampleInputEmail1"
            required
            aria-describedby="emailHelp"
            placeholder="Nhập email"
          />
          <small id="emailHelp" class="form-text text-muted"
            >Chúng tôi sẽ không bao giờ chia sẻ email của bạn với bất kỳ ai
            khác.</small
          >
        </div>
        <div class="form-group">
          <label for="exampleInputPassword1">Mật khẩu</label>
          <input
            type="password"
            required
            class="form-control"
            id="exampleInputPassword1"
            placeholder="Mật khẩu"
          />
        </div>
        <!-- <div class="form-group">
          <label for="exampleInputPassword2">Xác nhận mật khẩu</label>
          <input
            type="password"
            class="form-control"
            id="exampleInputPassword2"
            placeholder="Xác nhận mật khẩu"
          />
        </div> -->
        <div class="form-check">
          <input type="checkbox" class="form-check-input" id="exampleCheck1" />
          <label class="form-check-label" for="exampleCheck1"
            >Ghi nhớ tôi</label
          >
        </div>
        <button type="submit" class="btn btn-primary">Đăng ký</button>
      </form>
      <div class="d-flex flex-column text-center">
        <span>Đã có tài khoản? <a href="./login.html">Đăng nhập ngay</a></span>
        <a href="./home.html">Quay lại trang chủ </a>
      </div>
    </section>
    <script type="module" src="js/main.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
