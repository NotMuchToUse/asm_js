<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sản phẩm</title>
    <link
      rel="shortcut icon"
      href="./asset/logo-main.png"
      type="image/x-icon"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <!-- Navbar -->
    <nav id="navbar" class="navbar navbar-expand-lg bg-body-tertiary"></nav>

    <!-- Main -->
    <main>
      <!-- Product section -->
      <section>
        <div class="container">
          <div
            class="d-flex justify-content-between align-items-center mt-2 mb-2"
          >
            <!-- Search -->
            <div class="d-flex flex-column justify-content-center">
              <label class="form-label">Tìm kiếm</label>
              <div class="input-group mb-3">
                <button
                  class="btn btn-primary"
                  type="button"
                  id="button-addon1"
                >
                  <i class="fa-solid fa-magnifying-glass"></i>
                </button>
                <input
                  type="text"
                  class="form-control"
                  placeholder="Tìm kiếm..."
                  aria-label="Example text with button addon"
                  aria-describedby="button-addon1"
                />
              </div>
            </div>
            <!-- Sort -->
            <div class="d-flex align-items-center gap-3">
              <div class="d-flex flex-column">
                <label class="form-label">Sắp xếp theo: </label>
                <select class="form-select" aria-label="Default select example">
                  <option selected>Tất cả</option>
                  <option value="1">Giá từ thấp đến cao</option>
                  <option value="2">Giá từ cao đến thấp</option>
                </select>
              </div>

              <!-- Lọc -->
              <div class="d-flex flex-column">
                <label class="form-label">Lọc: </label>
                <button class="btn btn-primary">
                  <i class="fa-solid fa-filter"></i>
                </button>
              </div>
            </div>
          </div>

          <hr class="border border-primary border-3 opacity-75" />

          <!-- Product -->
          <div
            class="d-flex justify-content-center flex-wrap gap-3"
            id="pro"
          ></div>
        </div>
      </section>

      <!-- Load More -->
      <div class="d-flex justify-content-center mt-4">
        <button id="loadMoreBtn" class="btn btn-outline-primary px-5">
          Xem thêm sản phẩm
        </button>
      </div>

    <!-- Footer -->
    <footer class="bg-dark text-white py-4 mt-2">
      <div class="container">
        <div class="row text-center text-md-start">
          <div class="col-md-6 col-lg-6 mb-3">
            <div class="d-flex align-items-center gap-1">
              <img
                src="./asset/logo-main.png"
                alt="logo"
                width="40px"
                height="40px"
              />
              <h6 class="text-uppercase fw-bold">BICHO</h6>
            </div>
            <p>Cà phê chất lượng, đậm đà hương vị Việt Nam</p>
          </div>

          <div class="col-md-6 col-lg-6 mb-3">
            <h6 class="text-uppercase fw-bold">Liên hệ</h6>
            <p><i class="fas fa-phone me-2"></i> 0123 456 789</p>
            <p><i class="fas fa-envelope me-2"></i> hello@capheom.com</p>
          </div>
        </div>

        <!-- Copyright -->
        <div class="border-top pt-3 text-center">
          © 2026. Tất cả quyền thuộc về PC11152.
        </div>
      </div>
    </footer>
    <script type="module" src="js/main.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
