<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Giỏ hàng</title>
    <link
      rel="shortcut icon"
      href="./asset/logo-main.png"
      type="image/x-icon"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <style>
      .cart-item {
        transition: all 0.3s ease;
      }
      .cart-item:hover {
        background-color: #f8f9fa;
      }
      .cart-empty {
        text-align: center;
        padding: 3rem;
      }
      .cart-summary {
        background-color: #f8f9fa;
        border-radius: 8px;
        padding: 2rem;
      }
      .quantity-control {
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }
      .quantity-control button {
        width: 40px;
        height: 40px;
        padding: 0;
      }
      .quantity-control input {
        width: 80px;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <!-- Navbar -->
    <nav id="navbar" class="navbar navbar-expand-lg bg-body-tertiary"></nav>

    <!-- Main -->
    <main class="py-5">
      <div class="container">
        <h1 class="mb-4">
          <i class="fa-solid fa-cart-shopping"></i> Giỏ hàng của bạn
        </h1>

        <!-- Cart items -->
        <div class="row">
          <!-- Cart List -->
          <div class="col-lg-8">
            <div id="cartItems" class="card">
              <!-- Cart items will be rendered here -->
            </div>
          </div>

          <!-- Cart Summary -->
          <div class="col-lg-4">
            <div class="cart-summary card">
              <h5 class="card-title mb-3">Tóm tắt đơn hàng</h5>

              <div class="d-flex justify-content-between mb-2">
                <span>Tổng sản phẩm:</span>
                <strong id="totalItems">0</strong>
              </div>

              <div class="d-flex justify-content-between mb-2">
                <span>Tổng số lượng:</span>
                <strong id="totalQuantity">0</strong>
              </div>

              <hr />

              <div class="d-flex justify-content-between mb-3">
                <span class="fs-5">Tổng tiền:</span>
                <strong class="fs-5 text-danger" id="totalPrice">0 đ</strong>
              </div>

              <button class="btn btn-primary w-100 mb-2" id="checkoutBtn">
                <i class="fa-solid fa-credit-card"></i> Thanh toán
              </button>

              <a
                href="./product.html"
                class="btn btn-outline-secondary w-100 mb-2"
              >
                <i class="fa-solid fa-arrow-left"></i> Tiếp tục mua sắm
              </a>

              <button class="btn btn-outline-danger w-100" id="clearCartBtn">
                <i class="fa-solid fa-trash"></i> Xóa toàn bộ giỏ
              </button>

              <div
                id="emptyMessage"
                class="alert alert-info mt-3"
                style="display: none"
              >
                <i class="fa-solid fa-info-circle"></i> Giỏ hàng của bạn đang
                trống.
                <a href="./product.html" class="alert-link">Mua sắm ngay</a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <!-- Footer -->
    <footer class="bg-body-tertiary py-4 mt-5">
      <div class="container text-center text-muted">
        <p>&copy; 2024 BICHO Coffee. All rights reserved.</p>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="./js/cartPage.js"></script>
  </body>
</html>
