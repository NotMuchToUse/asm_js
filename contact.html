<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Liên hệ</title>
    <link
      rel="shortcut icon"
      href="./asset/logo-main.png"
      type="image/x-icon"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
      <div class="container">
        <a class="navbar-brand d-flex align-items-center" href="./home.html">
          <img
            src="./asset/logo-main.png"
            alt="logo"
            width="40px"
            height="40px"
          />
          BICHO
        </a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
          aria-controls="navbarNav"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav">
            <li class="nav-item">
              <a class="nav-link active" aria-current="page" href="./home.html"
                >Trang chủ</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link" href="./product.html">Sản phẩm</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="./contact.html">Liên hệ</a>
            </li>
          </ul>
          <div class="ms-auto">
            <button class="nav-item btn btn-secondary">
              <a class="nav-link" href="./signup.html">Đăng ký</a>
            </button>
            <button class="nav-item btn btn-primary">
              <a class="nav-link" href="./login.html">Đăng nhập</a>
            </button>
          </div>
        </div>
      </div>
    </nav>

    <!-- Main -->
    <main>
      <section
        class="container d-flex flex-column justify-content-center align-items-center"
        style="height: 100vh"
      >
        <div class="d-flex align-items-center gap-1">
          <img
            src="./asset/logo-main.png"
            alt="logo"
            width="40px"
            height="40px"
          />
          <h1>Liên hệ</h1>
        </div>
        <form class="border p-5 rounded d-flex flex-column gap-2 shadow w-50">
          <div class="form-group">
            <label for="exampleInputEmail1">Tên khách hàng</label>
            <input
              type="text"
              class="form-control"
              id="exampleInputEmail1"
              aria-describedby="emailHelp"
              placeholder="Nhập tên khách hàng"
            />
          </div>
          <div class="form-group">
            <label for="exampleInputPassword1">Số điện thoại</label>
            <input
              type="text"
              class="form-control"
              id="exampleInputPassword1"
              placeholder="Nhập số điện thoại"
            />
          </div>
          <div class="form-group">
            <label for="exampleInputPassword2">Email</label>
            <input
              type="email"
              class="form-control"
              id="exampleInputPassword2"
              placeholder="Nhập email"
            />
          </div>
          <div class="form-group">
            <label for="exampleInputPassword2">Nội dung liên hệ</label>
            <textarea
              type="text"
              class="form-control"
              id="exampleInputPassword2"
              placeholder="Nhập nội dung liên hệ..."
            ></textarea>
          </div>
          <button type="submit" class="btn btn-primary">Gửi</button>
        </form>
      </section>
    </main>

    <!-- Footer -->
    <footer class="bg-dark text-white py-4 mt-2">
      <div class="container">
        <div class="row text-center text-md-start">
          <div class="col-md-6 col-lg-6 mb-3">
            <div class="d-flex align-items-center gap-1">
              <img
                src="./asset/logo-main.png"
                alt="logo"
                width="40px"
                height="40px"
              />
              <h6 class="text-uppercase fw-bold">BICHO</h6>
            </div>
            <p>Cà phê chất lượng, đậm đà hương vị Việt Nam</p>
          </div>

          <div class="col-md-6 col-lg-6 mb-3">
            <h6 class="text-uppercase fw-bold">Liên hệ</h6>
            <p><i class="fas fa-phone me-2"></i> 0123 456 789</p>
            <p><i class="fas fa-envelope me-2"></i> hello@capheom.com</p>
          </div>
        </div>

        <!-- Copyright -->
        <div class="border-top pt-3 text-center">
          © 2026. Tất cả quyền thuộc về PC11152.
        </div>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
